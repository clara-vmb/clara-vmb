name: generate animation

on:
  # Executa automaticamente uma vez por dia (à meia-noite)
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite executar o job manualmente a qualquer momento
  workflow_dispatch:
  
  # Executa a cada push no ramo principal
  push:
    branches:
      - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Garante que o ambiente do GitHub Actions acesse o repositório
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gera o jogo da cobrinha a partir do gráfico de contribuições do utilizador clara-vmb
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: clara-vmb
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Envia o conteúdo gerado para o ramo 'output' usando a versão atualizada (v4)
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
