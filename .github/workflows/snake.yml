name: generate animation

on:
  # Executa automaticamente uma vez por dia (à meia-noite)
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite executar o job manualmente a qualquer momento
  workflow_dispatch:
  
  # Executa a cada push no ramo principal
  push:
    branches:
      - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Checkout atualizado para a versão que suporta nativamente o Node mais novo
      - name: checkout
        uses: actions/checkout@v5

      # 2. Gera o jogo da cobrinha a partir do gráfico de contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: clara-vmb
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Publica na branch 'output' usando uma action nativa do GitHub (muito mais rápida e sem avisos de Node)
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
