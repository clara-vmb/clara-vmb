name: Generate Datas

on:
  schedule:
    # Executa exatamente a cada 12 horas (à meia-noite e ao meio-dia)
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # Garante permissão para salvar os arquivos na branch de saída

    steps:
      # 1. Faz o checkout do repositório
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Gera a animação da cobrinha a partir do gráfico de contribuições
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: clara-vmb
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Publica os arquivos gerados na branch 'output' de forma segura
      - name: Push Snake SVG to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
